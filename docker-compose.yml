services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-amiplast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amiplast_password}
      POSTGRES_DB: ${POSTGRES_DB:-amiplast}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-amiplast} -d ${POSTGRES_DB:-amiplast}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://amiplast:amiplast_password@postgres:5432/amiplast}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-production-secret}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
